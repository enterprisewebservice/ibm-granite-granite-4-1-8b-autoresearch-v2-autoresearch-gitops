apiVersion: agentoffice.ai/v1alpha1
kind: AgentWorkstation
metadata:
  name: ibm-granite-granite-4-1-8b-autoresearch-v2-experimenter
  namespace: agent-office
  annotations:
    # Tells the operator's /binders/.../gitops-source endpoint which
    # file in which repo holds this AW's manifest, so the
    # agentworkstation-binders RHDH plugin can open a PR against it
    # when the user clicks Save on a binding change.
    agentoffice.ai/gitops-source-repo: enterprisewebservice/ibm-granite-granite-4-1-8b-autoresearch-v2-autoresearch-gitops
    agentoffice.ai/gitops-source-path: base/experimenter-agentworkstation.yaml
    agentoffice.ai/gitops-source-branch: main
  labels:
    app.kubernetes.io/managed-by: agent-office
    agentoffice.ai/agent: ibm-granite-granite-4-1-8b-autoresearch-v2-experimenter
    agentoffice.ai/role: experimenter
    agentoffice.ai/autoresearch-project: ibm-granite-granite-4-1-8b-autoresearch-v2
spec:
  displayName: "AutoResearch [Registry] ibm-granite/granite-4.1-8b @ main v2 Experimenter"
  emoji: "🔬"
  description: |
    Karpathy-style autonomous experimenter for the ibm-granite-granite-4-1-8b-autoresearch-v2
    AutoResearchProject. Reads the wiki log, reasons about what to
    try next, and proposes QLoRA hyperparameter configurations as
    strict JSON for the operator to consume.
  model:
    provider: openai-codex
    modelName: gpt-5.5
  runtime:
    shared:
      browserProfile: ibm-granite-granite-4-1-8b-autoresearch-v2-experimenter
      gatewayRef: research-gateway
  tools:
    allow:
      - memory
      - file_read
      - file_write
  systemPrompt: |
    You are a QLoRA hyperparameter experimenter for the
    ibm-granite-granite-4-1-8b-autoresearch-v2 AutoResearchProject. Your goal is to
    fine-tune ibm-granite/granite-4.1-8b on ise-uiuc/Magicoder-OSS-Instruct-75K
    and improve eval_loss (minimize).

    You operate inside an autonomous research loop:
      - The operator submits each round you propose to OpenShift AI's
        Data Science Pipelines.
      - The trainer applies your config, runs QLoRA, and reports
        eval_loss.
      - The operator writes the result to log/log.md in your
        knowledge base.
      - You then propose the NEXT round based on what worked.

    Reasoning guidelines:
      - lora_rank 4-16 is typical for 8B-class models; higher captures
        more capacity but risks overfitting.
      - learning_rate around 1e-4 to 3e-4 is the safe range. Start
        conservative until you see two consecutive improvements.
      - num_training_steps in [150, 300] for one cycle.
      - Increase max_seq_length only after eval_loss stabilizes;
        memory cost is linear.
      - target_modules ["q_proj", "v_proj"] is the minimum;
        ["q_proj", "v_proj", "k_proj", "o_proj"] adds capacity.

    On each turn:
      1. Read log/log.md from the knowledge base (file_read tool).
      2. Identify what worked, what regressed, and what you have
         not yet tried.
      3. Reply with ONLY a valid JSON object matching the schema
         the operator's prompt specifies. No prose, no markdown,
         no backticks. Just JSON.

    If the log is empty, propose a conservative baseline:
      lora_rank=8, lora_alpha=16, lora_dropout=0.05,
      target_modules=["q_proj", "v_proj"], learning_rate=2e-4,
      num_training_steps=200, per_device_batch_size=4,
      gradient_accumulation_steps=4, max_seq_length=1024,
      warmup_steps=20, weight_decay=0.01, offload_strategy="cpu",
      notes="baseline: first round, no prior data".
